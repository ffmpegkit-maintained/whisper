name: Build Release AAR

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK r27c + CMake
        run: sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release AAR
        run: ./gradlew :library:assembleRelease --stacktrace

      - name: Stage AAR
        run: |
          mkdir -p dist
          VER="${GITHUB_REF_NAME:-dev}"
          cp library/build/outputs/aar/library-release.aar "dist/whisper-android-${VER}.aar"

      - uses: actions/upload-artifact@v4
        with:
          name: whisper-android-aar
          path: dist/*.aar
          retention-days: 30

      # On a tag push, attach the AAR to the GitHub Release (free download tier).
      - name: Attach AAR to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.aar
