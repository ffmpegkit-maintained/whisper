name: Build Debug (sample)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pull whisper.cpp

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK r27c + CMake
        run: sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build sample (debug)
        run: ./gradlew :sample:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: sample-debug-apk
          path: sample/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Docs version consistency check
        # Source of truth = what's ACTUALLY live on Maven Central (not gradle.properties'
        # VERSION, which can be bumped locally without ever being published).
        run: |
          V=$(curl -sf "https://repo1.maven.org/maven2/dev/ffmpegkit-maintained/whisper-android/maven-metadata.xml" \
            | grep -oP '<release>\K[^<]+')
          if [ -z "$V" ]; then
            echo "::error::could not fetch the current release version from Maven Central metadata"
            exit 1
          fi
          echo "Live on Maven Central: $V"
          if ! grep -q "dev.ffmpegkit-maintained:whisper-android:$V" README.md; then
            echo "::error file=README.md::does not mention the Maven Central version ($V) — likely stale."
            exit 1
          fi
          echo "README.md is in sync with $V."
