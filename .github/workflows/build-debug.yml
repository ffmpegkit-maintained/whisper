name: Build Debug (sample)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pull whisper.cpp

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK r27c + CMake
        run: sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build sample (debug)
        run: ./gradlew :sample:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: sample-debug-apk
          path: sample/build/outputs/apk/debug/*.apk
          retention-days: 5
