name: Build Sample Release APK

# Manual — builds the sample app in the RELEASE variant (optimised native code)
# for on-device performance testing.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK r27c + CMake
        run: sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build sample (release)
        run: ./gradlew :sample:assembleRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: sample-release-apk
          path: sample/build/outputs/apk/release/*.apk
          retention-days: 7
